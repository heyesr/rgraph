<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.common.core.js" ></script>
    <script src="../libraries/RGraph.gantt.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>A demo of the dotted or dashed background grid</h1>
    
    <div id="rgraph-demo-html">
        <canvas id="cvs1" width="600" height="250">[No canvas support]</canvas>
        <canvas id="cvs2" width="600" height="250">[No canvas support]</canvas>
    </div>

    <script>
        new RGraph.Gantt({
            id: 'cvs1',
            data: [
                {start: 0, duration: 5, complete: 50, label: 'Richard'},
                {start: 3, duration: 2, complete: 25, label: 'John'},
                {start: 3, duration: 2, complete: 10, label: 'Fred'}
            ],
            options: {                
                xaxisLabels: ['Monday','Tuesday','Wednesday','Thursday','Friday'],
                xaxisScaleMax: 5,
                title: 'A dashed background grid',
                backgroundGridDashed: true,
                backgroundGridColor: 'gray',
                marginRight: 45,
                marginLeft: 145,
                marginInner: 15,
                borders: false
            }
        }).draw();



        new RGraph.Gantt({
            id: 'cvs2',
            data: [
                {start: 0, duration: 5, complete: 50, label: 'Richard'},
                {start: 3, duration: 2, complete: 25, label: 'John'},
                {start: 3, duration: 2, complete: 10, label: 'Freed'}
            ],
            options: {
                marginInner: 15,
                borders: false,
                xaxisLabels: ['Monday','Tuesday','Wednesday','Thursday','Friday'],
                xaxisScaleMax: 5,
                title: 'A dotted background grid',
                titleY: 25,
                backgroundGridDotted: true,
                backgroundGridColor: 'gray',
                marginRight: 45
            }
        }).draw();
    </script>
    
    <script>showSource()</script>
    
</body>
</html>
