<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.svg.common.core.js" ></script>
    <script src="../libraries/RGraph.svg.common.tooltips.js" ></script>
    <script src="../libraries/RGraph.svg.pie.js" ></script>
    <script src="../libraries/RGraph.svg.bar.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>An SVG version of a canvas Pie/Bar example chart</h1>

    <div id="rgraph-demo-html">
        <div id="chart-container" style="width: 650px; height: 350px"></div>
    </div>

        
    <script>
        var bar = new RGraph.SVG.Bar({
            id: 'chart-container',
            data: [[50,60,52],[65,30,50],[40,80,70],[115,100,70]],
            options: {
                labelsAbove: true,
                labelsAboveSize: 10,
                xaxisLabels: ['Bob', 'Jamie', 'Cynthia', 'Peter'],
                marginInner: 25,
                colors: ['Gradient(#f11:#f11:white)','Gradient(#1cc:#1cc:white)','Gradient(#00f:#00f:white)']
            }
        }).wave();
        
        var pie = new RGraph.SVG.Pie({
            id: 'chart-container',
            data: [270,270,164],
            options: {
                exploded: 1,
                centerx: 90,
                centery: 85,
                radius: 30,
                tooltips: ['Total Monday sales: 270','Total Tuesday sales: 270','Total Wednesday sales: 264'],
                tooltipsEvent: 'mousemove',
                labels: ['Mondays results'],
                labelsSticks: false,
                textBold: true,
                colors: bar.properties.colors
            },
        }).roundRobin({frames: 50});
    </script>

    <script>showSource()</script>

</body>
</html>
