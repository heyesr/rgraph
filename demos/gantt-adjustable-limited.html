<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.common.core.js" ></script>
    <script src="../libraries/RGraph.common.dynamic.js" ></script>
    <script src="../libraries/RGraph.gantt.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>An adjustable Gantt chart with only one bar adjustable</h1>
    
    <div id="rgraph-demo-html">
        <canvas id="cvs" width="800" height="350">[No canvas support]</canvas>
    </div>

    <script>
        data = [
            [{start: 0, duration: 31, complete: 67, label: 'Richard', border: 'transparent'}, {start: 59, duration: 28, complete: 67, border: 'transparent'}],
            {start: 0,  duration: 28, complete: 50, label: 'Rachel', border: 'transparent'},
            {start: 12, duration: 28, complete: 45, label: 'Fred', border: 'transparent'},
            [{start: 0, duration: 14, complete: 0, label: 'Barney', border: 'transparent'}, {start: 59, duration: 21, complete: 5, border: 'transparent'}],            
            {start: 46, duration: 31,  complete: 92, label: 'Paul', color: 'red', border: 'transparent'},
            {start: 80, duration: 21,  complete: 46, label: 'Harry', border: 'transparent'},
            {start: 94, duration: 17,  complete: 84, label: 'Shane', border: 'transparent'},
            {start: 34, duration: 14,  complete: 32, label: 'Kyle', border: 'transparent'},
            {start: 64, duration: 14,  complete: 28, label: 'Cynthia', border: 'transparent'},
            {start: 13, duration: 61,  complete: 74, label: 'Mabel', border: 'transparent'},
            {start: 84, duration: 31,  complete: 16, label: 'Paul', border: 'transparent'},
            {start: 80, duration: 22,  complete: 45, label: 'Kiffen', border: 'transparent'},
            {start: 0,  duration: 115, complete: 50, label: 'John', border: 'transparent'}
        ];

        new RGraph.Gantt({
            id: 'cvs',
            data: data,
            options: {
                xaxisLabels: ['January', 'February', 'March', 'April'],
                xaxisScaleMax: 120,
                labelsComplete: true,
                backgroundGridVlinesCount: 4,
                adjustable: true,
                adjustableOnly: [,,,,,,true],
                cornersRoundRadius: 50
            }
        }).draw();
    </script>
    
    <script>showSource()</script>
    
</body>
</html>
