<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.common.core.js" ></script>
    <script src="../libraries/RGraph.bar.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>An over-and-under Bar chart</h1>

    <div id="rgraph-demo-html">
        <canvas id="cvs" width="350" height="200">[No canvas support]</canvas>
    </div>
    
    <script>
        top_data    = [20,18,17,3,0,5,6,15,24,21,25,15,18,23,24,22,1,5,4,8,20,23,34,26,20,6,1,2,3,4];;
        bottom_data = [20,18,17,3,0,5,6,15,24,21,25,15,18,23,24,22,1,5,4,8,20,23,34,26,20,6,1,2,3,4];
        max         = 50;

        // Make all of the bottom data values negative
        bottom_data.forEach(function (v,k,arr)
        {
            arr[k] = -1 * v;
        });

        new RGraph.Bar({
            id: 'cvs',
            data: top_data,
            options: {
                marginInner: 2,
                yaxisScaleMax: max,
                yaxisLabelsCount: 1,
                colors: ['#0071BC'],
                backgroundGridHlinesCount: 1,
                corners: 'square',
                xaxisPosition: 'center'

            }
        }).wave();
    
        new RGraph.Bar({
            id: 'cvs',
            data: bottom_data,
            options: {
                corners: 'square',
                yaxisScale: false,
                colors: ['#F7931E'],
                backgroundGridHlinesCount: 1,
                xaxisPosition: 'center',
                marginInner: 2,
                xaxis: true,
                xaxisColor: 'white',
                xaxisPosition: 'center',
                xaxisLinewidth: 2
            }
        }).wave();
    </script>

    <script>showSource()</script>

</body>
</html>
