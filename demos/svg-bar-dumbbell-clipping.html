<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.svg.common.core.js" ></script>
    <script src="../libraries/RGraph.svg.common.tooltips.js" ></script>
    <script src="../libraries/RGraph.svg.bar.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>An SVG dumbbell chart using clipping</h1>
    
    <div id="rgraph-demo-html">
        <div style="width: 650px; height: 300px" id="chart-container"></div>
    </div>

    <script>

        new RGraph.SVG.Bar({
            id: 'chart-container',
            data: DATA = [[0,20],[5,10],[10,15],[5,20],[5,12],[3,8],[6,20]],
            options: OPTIONS = {
                marginLeft: 45,
                marginBottom: 45,
                xaxisScaleMax: 20,
                variant: 'dumbbell',
                colors: ['black'],
                textSize: 23,
                xaxisLinewidth: 3,
                xaxisLabelsOffsety: 3,
                xaxisTickmarks: false,
                yaxis: false,
                backgroundGridHlines: false,
                backgroundGridBorder: false,
                yaxisLabelsCount: 4,
                backgroundGridHlinesCount: 4,
                xaxisLabels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
                _daysLong: ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'],                
                tooltips: '%{property:_daysLong[%{group}]}',
                clip: 'scale:min-6.666',
                shadow: true,
                shadowOffsetx: 2,
                shadowOffsety: 2,
                shadowBlur: 2,
                tooltipsCSS: {
                    fontSize: '20pt'
                }
            }
        }).draw();


        new RGraph.SVG.Bar({
            id: 'chart-container',
            data: DATA,
            options: {
                ...OPTIONS,
                colors: ['red'],
                textSize: 23,
                clip: 'scale:6.666-13.333'
            }
        }).draw();


        new RGraph.SVG.Bar({
            id: 'chart-container',
            data: DATA,
            options: {
                ...OPTIONS,
                colors: ['green'],
                textSize: 23,
                clip: 'scale:13.333-max'
            }
        }).draw();
    </script>

    <script>showSource()</script>

</body>
</html>
