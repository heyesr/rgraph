<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.svg.common.core.js" ></script>
    <script src="../libraries/RGraph.svg.common.key.js" ></script>
    <script src="../libraries/RGraph.svg.line.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>An SVG filled and stacked Line chart</h1>

    <div id="rgraph-demo-html">
        <div>
            <div style="width: 600px; height: 300px" id="chart-container"></div>
        </div>
    </div>

    <script id="rgraph-demo-source-code">
        // Create the Line chart and give it the three datasets.
        new RGraph.SVG.Line({
            id: 'chart-container',
            data: [
                [4,6,12,16,8,4,2,8,18,16,14,16],
                [2,4,8,4,2,6,6,12,8,10,6,8],
                [1,3.5,5,3,4,5,6,11,8,9,5,7]
            ],
            options: {
                key: ['Robert','Daniel','Janice'],
                keyColors: ['green','blue','red'],
                xaxisLabels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                marginTop: 55,
                marginRight: 15,
                marginLeft: 50,
                marginBottom: 50,
                colors: ['#666', '#666', '#666'],
                filled: true,
                filledAccumulative: true,
                filledColors: [
                    'Gradient(red:white)',
                    'Gradient(blue:white)',
                    'Gradient(green:white)'
                ],
                yaxisScaleUnitsPost: '%',
                linewidth: 0.001,
                marginInner: 0,
                title: 'Robert, Daniel and Janices stats',
                textColor: '#333',
                textFont: 'Arial',
                spline: true,
                responsive: [
                    {maxWidth:null,width:600,height:300,options:{textSize: 12}},
                    {maxWidth:900,width:450,height:250,options:{textSize: 10}}
                ]
            }
        }).trace();
    </script>

    <script>showSource()</script>

</body>
</html>
