<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.common.core.js" ></script>
    <script src="../libraries/RGraph.common.dynamic.js" ></script>
    <script src="../libraries/RGraph.common.tooltips.js" ></script>
    <script src="../libraries/RGraph.hbar.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>A dumbbell Horizontal Bar chart using clipping</h1>

    <div id="rgraph-demo-html">
        <canvas id="cvs" width="600" height="500">[No canvas support]</canvas>
    </div>
    
    <script>
        new RGraph.HBar({
            id: 'cvs',
            data: DATA = [[0,20],[5,10],[10,15],[15,20]],
            options: OPTIONS = {
                xaxisScaleMax: 20,
                variant: 'dumbbell',
                colors: ['black'],
                textSize: 23,
                yaxisLinewidth: 3,
                yaxisTickmarks: false,
                yaxisLabelsOffsetx: -5,
                xaxis: false,
                backgroundGridHlines: false,
                backgroundGridBorder: false,
                xaxisLabelsCount: 4,
                backgroundGridVlinesCount: 4,
                marginLeftAuto: false,
                marginLeft: 200,
                yaxisLabels: ['Monday','Tuesday','Wednesday','Thursday'],
                tooltips: '%{property:yaxisLabels[%{seq}]}',
                clip: 'scale:min-6.666'
            }
        }).grow();


        new RGraph.HBar({
            id: 'cvs',
            data: DATA,
            options: {
                ...OPTIONS,
                colors: ['red'],
                textSize: 23,
                clip: 'scale:6.666-13.333'
            }
        }).draw();


        new RGraph.HBar({
            id: 'cvs',
            data: DATA,
            options: {
                ...OPTIONS,
                colors: ['green'],
                textSize: 23,
                clip: 'scale:13.333-max'
            }
        }).draw();
    </script>
    
    <script>showSource()</script>

</body>
</html>
