<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.common.core.js" ></script>
    <script src="../libraries/RGraph.gantt.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>A basic Gantt chart</h1>
    
    <div id="rgraph-demo-html">
        <canvas id="cvs" width="800" height="350">[No canvas support]</canvas>
    </div>

    <script>
        data = [
            {start: 31, duration: 28, linewidth: 0},
            {start: 0,  duration: 28, linewidth: 0},
            {start: 12, duration: 28, linewidth: 0},
            {start: 59, duration: 14, linewidth: 0},
            {start: 59, duration: 21, linewidth: 0},
            {start: 46, duration: 31, linewidth: 0},
            {start: 80, duration: 21, linewidth: 0},
            {start: 94, duration: 17, linewidth: 0},
            {start: 34, duration: 14, linewidth: 0},
            {start: 64, duration: 14, linewidth: 0},
            {start: 13, duration: 61, linewidth: 0},
            {start: 34, duration: 31, linewidth: 0},
            {start: 80, duration: 22, linewidth: 0},
            {start: 0,  duration: 115,linewidth: 0}
        ];

        gantt = new RGraph.Gantt({
            id: 'cvs',
            data: data,
            options: {
                xaxisScaleMax: 122
            }
        }).draw();
    </script>
    
    <script>showSource()</script>
    
</body>
</html>
