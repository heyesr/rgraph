<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.svg.common.core.js" ></script>
    <script src="../libraries/RGraph.svg.common.tooltips.js" ></script>
    <script src="../libraries/RGraph.svg.bar.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>A grouped and stacked SVG dumbbell chart</h1>
    
    <div id="rgraph-demo-html">
        <div style="width: 750px; height: 300px" id="chart-container"></div>
    </div>

    <script>
        new RGraph.SVG.Bar({
            id: 'chart-container',
            data: [0,0,0,0],
            options: {
                xaxisLabels: ['Monday','Tuesday','Wednesday','Thursday'],
                xaxisLabelsOffsety: 5,
                xaxisLinewidth: 3,
                xaxisTickmarks: false,
                yaxis: false,
                marginBottom: 50,
                marginLeft: 50,
                textSize: 23,
                xaxisLabelsOffsetx: -10,
                yaxisScaleMax: 25
            }
        }).draw();
        
        tooltipsA = [
            'Jim (b)','Jim (o)',
            'Jim (b)','Jim (o)',
            'Jim (b)','Jim (o)',
            'Jim (b)','Jim (o)'
        ];
        
        tooltipsB = [
            'Berty (r)','Berty (g)',
            'Berty (r)','Berty (g)',
            'Berty (r)','Berty (g)',
            'Berty (r)','Berty (g)'
        ];



        new RGraph.SVG.Bar({
            id: 'chart-container',
            data: [[5,15,20],[5,6,10],[10,13,15],[15,18,20]],
            options: {
                variant: 'dumbbell',
                //variantDumbbellLinewidth: 4,
                //variantDumbbellEndTop: false,
                //variantDumbbellEndBottom: false,
                //variantDumbbellEndRadius: 15,
                shadow: false,
                colors: ['#000','orange'],
                textSize: 23,
                xaxisLinewidth: 3,
                xaxis: false,
                xaxisTickmarks: false,
                xaxisLabelsOffsetx: -5,
                yaxis: false,
                yaxisScale: false,
                backgroundGrid: false,
                xaxisLabelsCount: 4,
                marginBottom: 50,
                marginLeft: 5,
                marginRight: 65,
                tooltips: tooltipsA,
                shadow: true,
                yaxisScaleMax: 25
            }
        }).draw();

        new RGraph.SVG.Bar({
            id: 'chart-container',
            data: [[0,10,25],[0,10,25],[10,15,25],[0,10,20]],
            options: {
                variant: 'dumbbell',
                colors: ['red','gray'],
                xaxis: false,
                yaxis: false,
                yaxisScale: false,
                backgroundGrid: false,
                marginBottom: 50,
                marginLeft: 65,
                marginRight: 5,
                tooltips: tooltipsB,
                shadow: true,
                yaxisScaleMax: 25
            }
        }).draw();
    </script>

    <script>showSource()</script>

</body>
</html>
