<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.common.core.js" ></script>
    <script src="../libraries/RGraph.common.dynamic.js" ></script>
    <script src="../libraries/RGraph.bar.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>A customised, adjustable Bar chart</h1>

    <div id="rgraph-demo-html">
        <div id="canvas-container">
            <canvas id="cvs" width="600" height="250" data-image-src="page-demos-bar-onadjust.png">[No canvas support]</canvas>
        </div>
    </div>

    <script id="rgraph-demo-source-code">
    
        original_data = [180,45,32,68,88,45,12];
        yaxisScaleMax = 300;
        
    
        // Create the Bar chart and configure it with the maximum Y value set to the
        // combined maximum value. The Bar chart is configured to be adjustable.
        bar = new RGraph.Bar({
            id: 'cvs',
            data: RGraph.arrayClone(original_data),
            options: {
                xaxisLabels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
                adjustable: true,
                marginLeft: 50,
                yaxisScaleMax: yaxisScaleMax,
                labelsAbove: true,
                labelsAboveDecimals: 1,
                
                // Add some responsive capability to the chart so
                // it works well on smaller devices
                responsive: [
                    {maxWidth: null,width:600,height:300,options: {labelsAboveSize: 14,textSize: 14}},
                    {maxWidth: 900,width:400,height:200,options: {labelsAboveSize: 10,textSize: 10}}
                ],
                events: {
                    
                    // Here's the adjust event that changes the bars
                    // based on the one thats being adjusted and what
                    // it has been adjusted to.
                    adjust: function (obj)
                    {
                        // First - determine what the diff is between
                        // the current data value and the original
                        // value of this data piece.
                        var shape    = RGraph.Registry.get('adjusting.shape');
                        var current  = obj.data[shape.dataset];
                        var original = original_data[shape.dataset];
                        var diff     = current - original;
                        var value    = null; // Used later
                        
                        // Now we know the diff add it to each of the
                        // data pieces
                        for (var i=0; i<obj.data.length; ++i) {
                            value = Math.min(original_data[i] + diff, 300);
                            value = Math.max(value, 0);

                            obj.data[i] = value;
                        }
                        
                        RGraph.redraw();
                    }
                }
            }
        }).draw();
    </script>

    <script>showSource()</script>

</body>
</html>
