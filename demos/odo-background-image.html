<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.common.core.js" ></script>
    <script src="../libraries/RGraph.drawing.image.js" ></script>
    <script src="../libraries/RGraph.odo.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>    
    <h1>An Odometer chart using a background image</h1>

    <div id="rgraph-demo-html">
        <canvas id="cvs" width="300" height="300">[No canvas support]</canvas>
    </div>
    
    <script>
        new RGraph.Drawing.Image({
            id: 'cvs',
            x: -4,
            y: 0,
            src: '../images/odometer-background.png',
            options: {
                width: 300,
                height: 300,
            }
        }).draw();
        
        new RGraph.Odometer({
            id: 'cvs',
            min: 0,
            max: 360,
            value: 45,
            options: {
                colorsGreenColor: 'transparent',
                colorsYellowColor: 'transparent',
                colorsRedColor: 'transparent',
                backgroundColor: 'transparent',
                backgroundBorder: 'transparent',
                backgroundLinesColor: 'transparent',
                tickmarks: false,
                border: false,
                tickmarksLargeColor: 'transparent',
                textColor: 'transparent',
                needleColor: 'white',
                needleTail: false,
                needleLength: 100
            }
        }).draw();
    </script>
    
    <script>showSource()</script>

</body>
</html>
