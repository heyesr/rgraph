<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.svg.common.core.js" ></script>
    <script src="../libraries/RGraph.svg.common.tooltips.js" ></script>
    <script src="../libraries/RGraph.svg.bar.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>A grouped SVG dumbbell chart</h1>
    
    <div id="rgraph-demo-html">
        <div style="width: 750px; height: 300px" id="chart-container"></div>
    </div>

    <script>
        new RGraph.SVG.Bar({
            id: 'chart-container',
            data: [0,0,0,0],
            options: {
                xaxisLabels: ['Monday','Tuesday','Wednesday','Thursday'],
                xaxisLinewidth: 3,
                xaxisTickmarks: false,
                yaxis: false,
                marginBottom: 50,
                marginLeft: 50,
                textSize: 20,
                xaxisLabelsOffsetx: -10,
                yaxisScaleMax: 20
            }
        }).draw();



        new RGraph.SVG.Bar({
            id: 'chart-container',
            data: [[3,20],[5,10],[10,15],[15,20]],
            options: {
                variant: 'dumbbell',
                //variantDumbbellLinewidth: 2,
                //variantDumbbellEndTop: false,
                //variantDumbbellEndBottom: false,
                //variantDumbbellEndRadius: 5,
                shadow: false,
                colors: ['#000'],
                textSize: 23,
                xaxisLinewidth: 3,
                xaxis: false,
                xaxisTickmarks: false,
                xaxisLabelsOffsetx: -5,
                yaxis: false,
                yaxisScale: false,
                backgroundGrid: false,
                xaxisLabelsCount: 4,
                marginBottom: 50,
                marginLeft: 5,
                marginRight: 65,
                tooltips: ['Jim (b)','Berty (b)','Lois (b)','Cava (b)'],
                shadow: true
            }
        }).draw();

        new RGraph.SVG.Bar({
            id: 'chart-container',
            data: [[1,12],[6,12],[9,13],[1,10]],
            options: {
                variant: 'dumbbell',
                colors: ['red'],
                xaxis: false,
                yaxis: false,
                yaxisScale: false,
                backgroundGrid: false,
                marginBottom: 50,
                marginLeft: 65,
                marginRight: 5,
                tooltips: ['Jim (r)','Berty (r)','Lois (r)','Cava (r)'],
                shadow: true
            }
        }).draw();
    </script>

    <script>showSource()</script>

</body>
</html>
