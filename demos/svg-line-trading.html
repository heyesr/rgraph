<!DOCTYPE html >
<html>
<head>
    <link rel="stylesheet" href="demos.css" type="text/css" media="screen" />
    <script src="../libraries/RGraph.svg.common.core.js" ></script>
    <script src="../libraries/RGraph.svg.bar.js" ></script>
    <script src="../libraries/RGraph.svg.line.js" ></script>
    <script src="demos.js" ></script>
    <meta name="robots" content="noindex, nofollow" />
</head>
<body>
    <h1>An SVG Line and Bar chart</h1>

    <div id="rgraph-demo-html">
        <div>
            <div id="chart-container" style="width: 600px; height: 250px"></div>
        </div>
    </div>
    
    <script id="rgraph-demo-source-code">

        data = [
            1,3,2,5,4,2,3,5,6,5,
            4,6,7,5,6,8,7,5,8,6,
            8,9,6,8,7,8,9,10,11,13,
            9,11,10,13,12,11,10,11,13,11
        ];

        spline = [];
        
        data.forEach (function (v, k, arr)
        {
            spline[k] = v - 1;
        });

        new RGraph.SVG.Line({
            id: 'chart-container',
            data: data,
            options: {
                xaxisLabels: ['Q1','Q2','Q3','Q4'],
                xaxisLabelsPosition: 'section',
                xaxisLabelsPositionSectionTickmarksCount: 4,
                textSize: 10,
                yaxisScaleMax: 15
            }
        }).draw();

        new RGraph.SVG.Line({
            id: 'chart-container',
            data: spline,
            options: {
                colors: ['rgba(0,0,0,0.25)'],
                spline: true,
                backgroundGrid: false,
                yaxisScale: false,
                yaxisScaleMax: 15
            }
        }).draw();
        
        new RGraph.SVG.Bar({
            id: 'chart-container',
            data:[
                1,8,6,3,5,4,2,5,8,4,
                4,6,3,5,6,5,2,4,5,8,
                1,9,4,6,8,5,2,3,5,6,
                4,8,6,4,4,3,2,1,5,4,
                7,6,8,5,4,5,9,9,8,6,
                7,6,8,5,4,5,9,9,8,6,
                7,6,8,5,4,5,9,9,8,6,
                1,3,2,5,4,9,1,2,3,5
            ],
            options: {
                marginTop: 125,
                backgroundGrid: false,
                colors: ['rgba(0,0,0,0.25)'],
                yaxisScale: false,
                yaxisScaleMax: 15,
                marginInner: 1,
                responsive: [
                    {maxWidth:null,width:600,height:250},
                    {maxWidth:900,width:400,height:200}
                ]
            }
        }).draw();
    </script>

    <script>showSource()</script>

</body>
</html>
